spring:
  application:
    name: mothersday
  datasource:
      url: ${DB_URL}
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  flyway:
    enabled: true

telegram:
  bot:
    token: ${TELEGRAM_TOKEN}
  chat:
    id: ${TELEGRAM_CHAT_ID}